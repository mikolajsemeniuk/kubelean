apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    kubernetes.io/service-name: {{ .ServiceName }}
    app: {{ .App }}
addressType: IPv4
endpoints:
  - addresses:
      - {{ .Address }}
    conditions:
      ready: true
ports:
  - name: http
    protocol: TCP
    port: {{ .Port }}
