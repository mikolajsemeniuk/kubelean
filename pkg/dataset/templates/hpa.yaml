apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ .TargetKind }}
    name: {{ .TargetName }}
  minReplicas: {{ .MinReplicas }}
  maxReplicas: {{ .MaxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
