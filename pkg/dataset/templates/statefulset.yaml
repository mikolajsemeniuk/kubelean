apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  serviceName: {{ .Name }}
  replicas: {{ .Replicas }}
  selector:
    matchLabels:
      app: {{ .SelectorApp }}
  template:
    metadata:
      labels:
        app: {{ .PodApp }}
    spec:
      containers:
        - name: {{ .ContainerName }}
          image: {{ .Image }}
          ports:
            - containerPort: {{ .ContainerPort }}
