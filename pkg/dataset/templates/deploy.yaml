apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  replicas: {{ .Replicas }}
  selector:
    matchLabels:
      app: {{ .SelectorApp }}
  template:
    metadata:
      labels:
        app: {{ .PodApp }}
    spec:
      containers:
        - name: {{ .ContainerName }}
          image: {{ .Image }}
          ports:
            - containerPort: {{ .ContainerPort }}
          {{- if or .ConfigMapRef .SecretRef }}
          envFrom:
            {{- if .ConfigMapRef }}
            - configMapRef:
                name: {{ .ConfigMapRef }}
            {{- end }}
            {{- if .SecretRef }}
            - secretRef:
                name: {{ .SecretRef }}
            {{- end }}
          {{- end }}
