apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  replicas: {{ .Replicas }}
  selector:
    matchLabels:
      app: {{ .SelectorApp }}
  template:
    metadata:
      labels:
        app: {{ .PodApp }}
    spec:
      {{- if .PriorityClassName }}
      priorityClassName: {{ .PriorityClassName }}
      {{- end }}
      {{- if .ServiceAccountName }}
      serviceAccountName: {{ .ServiceAccountName }}
      {{- end }}
      {{- if .ImagePullSecret }}
      imagePullSecrets:
        - name: {{ .ImagePullSecret }}
      {{- end }}
      containers:
        - name: {{ .ContainerName }}
          image: {{ .Image }}
          ports:
            - containerPort: {{ .ContainerPort }}
          {{- if .VolumeRef }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          {{- if or .ConfigMapRef .SecretRef }}
          envFrom:
            {{- if .ConfigMapRef }}
            - configMapRef:
                name: {{ .ConfigMapRef }}
            {{- end }}
            {{- if .SecretRef }}
            - secretRef:
                name: {{ .SecretRef }}
            {{- end }}
          {{- end }}
      {{- if .VolumeRef }}
      volumes:
        - name: data
          {{- if eq .VolumeKind "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .VolumeRef }}
          {{- else if eq .VolumeKind "configMap" }}
          configMap:
            name: {{ .VolumeRef }}
          {{- else }}
          secret:
            secretName: {{ .VolumeRef }}
          {{- end }}
      {{- end }}
