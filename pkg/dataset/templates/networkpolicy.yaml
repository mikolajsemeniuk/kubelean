apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  podSelector:
    matchLabels:
      app: {{ .PodSelectorApp }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .FromApp }}
      ports:
        - protocol: TCP
          port: {{ .Port }}
