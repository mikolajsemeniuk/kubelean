apiVersion: v1
kind: Service
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app: {{ .App }}
spec:
  type: {{ .Type }}
  {{- if .Headless }}
  clusterIP: None
  {{- end }}
  selector:
    app: {{ .SelectorApp }}
  ports:
    - port: {{ .Port }}
      targetPort: {{ .TargetPort }}
      {{- if .NodePort }}
      nodePort: {{ .NodePort }}
      {{- end }}
      protocol: TCP
